[package]
name = "shortcut-history"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
rusqlite = { version = "0.32", features = ["bundled"] }

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
